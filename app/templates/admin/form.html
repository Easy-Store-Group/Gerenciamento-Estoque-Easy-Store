{% extends "admin/base.html" %}

{% block content %}
<div class="form-card">
  <h2>Editar produto</h2>
  {% if erro %}
  <div class="alert alert-error">{{ erro }}</div>
  {% endif %}
  <form action="/produtos/{{ editando.id }}/editar" method="post" enctype="multipart/form-data">
    <div class="form-grid">
      <div class="input-group">
        <label>Nome do produto</label>
        <input type="text" name="nome" value="{{ editando.nome }}" required>
      </div>
      <div class="input-group">
        <label>Preço</label>
        <input type="number" step="0.01" name="preco" value="{{ editando.preco }}" required>
      </div>
      <div class="input-group">
        <label>Estoque atual</label>
        <input type="number" name="estoque_atual" value="{{ editando.estoque_atual }}" required>
      </div>
      <div class="input-group">
        <label>Categoria</label>
        <select name="categoria_id">
          <option value="0" {% if not editando.categoria_id %}selected{% endif %}>Sem categoria</option>
          {% for categoria in categorias %}
          <option value="{{ categoria.id }}" {% if editando.categoria_id == categoria.id %}selected{% endif %}>{{ categoria.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="input-group">
        <label>Substituir imagem</label>
        <input type="file" name="imagem" accept="image/png, image/jpeg, image/webp">
      </div>
    </div>
    <div class="field-preview">
      <span>Imagem atual</span>
      <img src="{{ editando.imagem_url }}" alt="{{ editando.nome }}">
    </div>
    <button type="submit" class="btn btn-primary">Salvar alterações</button>
  </form>
</div>
{% endblock %}
