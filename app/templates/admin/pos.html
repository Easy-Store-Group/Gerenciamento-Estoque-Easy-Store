{% extends "admin/pos-layout.html" %}

{% block content %}
<div class="pos-container">
  <!-- Seção de Produtos -->
  <div class="pos-products">
    <div class="pos-header">
      <h1>🎮 Frente de Caixa</h1>
      <p>Selecione produtos para iniciar a venda</p>
      <div class="search-box">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input type="text" id="searchProducts" placeholder="Buscar por nome ou categoria...">
      </div>
    </div>

    <div class="products-grid" id="productsGrid">
      <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
        Carregando produtos...
      </div>
    </div>
  </div>

  <!-- Carrinho -->
  <aside class="pos-cart">
    <div class="cart-header">
      <h2>🛒 Venda Atual</h2>
      <p id="cartItemCount">0 itens</p>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
        </svg>
        <p>Nenhum produto selecionado</p>
      </div>
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal:</span>
        <span id="subtotal">R$ 0,00</span>
      </div>
      <div class="summary-row discount" id="discountRow" style="display: none;">
        <span>Desconto XP:</span>
        <span id="discountAmount">- R$ 0,00</span>
      </div>
      <div class="summary-row total">
        <span>Total:</span>
        <span id="total">R$ 0,00</span>
      </div>
      <button class="btn-checkout" id="checkoutBtn" disabled>Finalizar Venda</button>
    </div>
  </aside>
</div>

<!-- Modal de Pagamento -->
<div class="modal" id="paymentModal">
  <div class="modal-content">
    <div class="modal-header">💳 Forma de Pagamento</div>
    <div class="modal-body">
      <div class="payment-method">
        <button class="payment-btn" data-method="Dinheiro">💵 Dinheiro</button>
        <button class="payment-btn" data-method="Débito">💳 Débito</button>
      </div>
      <div class="payment-method">
        <button class="payment-btn" data-method="Crédito">💳 Crédito</button>
        <button class="payment-btn" data-method="PIX">📱 PIX</button>
      </div>
      <div class="payment-method" style="margin-top: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Multi-pagamento:</label>
        <input type="text" id="multiPayment" placeholder="Ex: Dinheiro 100, PIX 50" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
      </div>
    </div>
    <button class="btn-checkout" id="confirmPaymentBtn">Confirmar</button>
    <button class="btn-checkout" style="background: #999; margin-top: 8px;" onclick="closePaymentModal()">Cancelar</button>
  </div>
</div>

<script>
let cart = [];
let allProducts = [];
let selectedPaymentMethod = null;

async function loadProducts() {
  try {
    const response = await fetch('/api/vendas/produtos');
    allProducts = await response.json();
    renderProducts(allProducts);
  } catch (error) {
    console.error('Erro ao carregar produtos:', error);
  }
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');

  if (products.length === 0) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">Nenhum produto encontrado</div>';
    return;
  }

  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="addToCart(${p.id}, '${p.nome}', ${p.preco})">
      <img src="${p.imagem}" alt="${p.nome}" class="product-image" onerror="this.src='/static/img/produto-placeholder.png'">
      <div class="product-category">${p.categoria}</div>
      <div class="product-name">${p.nome}</div>
      <div class="product-price">R$ ${p.preco.toFixed(2)}</div>
      <div class="product-stock">
        ${p.estoque > 0 ? `<span class="badge success">Em estoque (${p.estoque})</span>` : '<span class="badge danger">Fora de estoque</span>'}
      </div>
      <button class="btn-add">+ Adicionar</button>
    </div>
  `).join('');
}

function addToCart(productId, name, price) {
  const existing = cart.find(item => item.productId === productId);

  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ productId, name, price, quantity: 1 });
  }

  updateCart();
}

function updateCart() {
  const cartContainer = document.getElementById('cartItems');

  if (cart.length === 0) {
    cartContainer.innerHTML = '<div class="cart-empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg><p>Nenhum produto selecionado</p></div>';
    document.getElementById('cartItemCount').textContent = '0 itens';
    document.getElementById('checkoutBtn').disabled = true;
    updateTotals();
    return;
  }

  cartContainer.innerHTML = cart.map((item, index) => `
    <div class="cart-item">
      <div class="cart-item-info">
        <h4>${item.name}</h4>
        <div class="cart-item-qty">Qtd: <input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${index}, this.value)" style="width: 50px; padding: 4px;"></div>
        <div class="cart-item-price">R$ ${(item.price * item.quantity).toFixed(2)}</div>
      </div>
      <div class="cart-item-actions">
        <button class="btn-small" onclick="removeFromCart(${index})">✕</button>
      </div>
    </div>
  `).join('');

  document.getElementById('cartItemCount').textContent = `${cart.length} itens`;
  document.getElementById('checkoutBtn').disabled = false;
  updateTotals();
}

function updateQuantity(index, value) {
  const qty = parseInt(value) || 1;
  if (qty > 0) {
    cart[index].quantity = qty;
  } else {
    cart.splice(index, 1);
  }
  updateCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  updateCart();
}

function updateTotals() {
  const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

  document.getElementById('subtotal').textContent = `R$ ${subtotal.toFixed(2)}`;
  document.getElementById('total').textContent = `R$ ${subtotal.toFixed(2)}`;
  document.getElementById('discountRow').style.display = 'none';
}

document.getElementById('searchProducts').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  const filtered = allProducts.filter(p =>
    p.nome.toLowerCase().includes(query) ||
    p.categoria.toLowerCase().includes(query)
  );
  renderProducts(filtered);
});

document.getElementById('checkoutBtn').addEventListener('click', () => {
  document.getElementById('paymentModal').classList.add('active');
});

document.querySelectorAll('.payment-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    selectedPaymentMethod = e.target.dataset.method;
  });
});

document.getElementById('confirmPaymentBtn').addEventListener('click', async () => {
  if (!selectedPaymentMethod) {
    alert('Selecione uma forma de pagamento');
    return;
  }

  const itens = cart.map(item => ({
    produto_id: item.productId,
    quantidade: item.quantity
  }));

  try {
    const response = await fetch('/api/vendas/finalizar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        itens,
        metodos_pagamento: selectedPaymentMethod,
        usuario_id: null
      })
    });

    const resultado = await response.json();

    if (response.ok) {
      showXpNotification(resultado.xp_ganho);

      if (resultado.conquista) {
        showAchievementPopup(resultado.conquista.nome, `+R$ ${resultado.conquista.desconto} de desconto`);
      }

      cart = [];
      selectedPaymentMethod = null;
      updateCart();
      document.getElementById('paymentModal').classList.remove('active');
      loadProducts();
    } else {
      alert('Erro: ' + resultado.detail);
    }
  } catch (error) {
    console.error('Erro ao finalizar venda:', error);
    alert('Erro ao processar venda');
  }
});

function closePaymentModal() {
  document.getElementById('paymentModal').classList.remove('active');
  selectedPaymentMethod = null;
  document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active'));
}

function showXpNotification(xp) {
  const notification = document.createElement('div');
  notification.className = 'xp-notification';
  notification.innerHTML = `
    <div style="font-weight: 700; color: var(--primary);">🎮 +${xp} XP</div>
    <div style="font-size: 13px; color: #666; margin-top: 4px;">Você ganhou experiência!</div>
  `;
  document.body.appendChild(notification);

  setTimeout(() => notification.remove(), 3000);
}

function showAchievementPopup(title, message) {
  const popup = document.createElement('div');
  popup.className = 'achievement-popup';
  popup.innerHTML = `
    <div class="achievement-title">🏆 ${title}</div>
    <div class="achievement-reward">${message}</div>
  `;
  document.body.appendChild(popup);

  setTimeout(() => popup.remove(), 5000);
}

// Carregar produtos ao iniciar
loadProducts();
</script>

<style>
  input[type="number"] {
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
{% endblock %}
