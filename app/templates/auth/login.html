<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/login.css') }}">
    <title>EasyStore</title>
</head>
<body>
<div class="page" id="page">
  <!-- BRANDING -->
  <div class="branding" id="branding">
    <div class="bg-layer" id="bgLayer"></div>
    <div class="stars" id="stars"></div>

    <!-- Text content -->

    <div class="brand-content">
      <div class="logo-row">
        <img class="logo-icon" src="{{ request.url_for('static', path='img/logo.png') }}" alt="EasyStore logo" width="500">
        <span class="brand-name" id="brandName">EasyStore</span>
      </div>
      <p class="tagline" id="tagline">PCs, consoles e jogos<br>em um só lugar</p>
      <p class="sub">Seu universo gamer começa aqui ✦</p>
    </div>
  </div>

  <!-- FORM SIDE -->
  <div class="form-side">
    <div class="login-box">
      <h2>Entrar</h2>
      {% if erro %}
        <p style="color: red;">{{ erro }}</p>
      {% endif %}
      <form action="/auth/login" method="post">
        <div class="input-group">
          <label>E-mail</label>
          <input type="email" name="email" placeholder="Digite seu e-mail">
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" name="senha" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-confirm">✦ Confirmar</button>
        <p class="footer-text">Voltar para o<a href="/"> Inicio</a></p>
      </form>
    </div>
  </div>
</div>
<script src="{{ request.url_for('static', path='js/stars.js') }}"></script>
</body>
</html>
