<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/login.css') }}">
    <title>Criar Conta - EasyStore</title>
</head>
<body>
<div class="page" id="page">
  <!-- BRANDING -->
  <div class="branding" id="branding">
    <div class="bg-layer" id="bgLayer"></div>
    <div class="stars" id="stars"></div>

    <div class="brand-content">
      <div class="logo-row">
        <img class="logo-icon" src="{{ request.url_for('static', path='img/logo.png') }}" alt="EasyStore logo" width="500">
        <span class="brand-name" id="brandName">EasyStore</span>
      </div>
      <p class="tagline" id="tagline">PCs, consoles e jogos<br>em um só lugar</p>
      <p class="sub">Seu universo gamer começa aqui ✦</p>
    </div>
  </div>

  <!-- FORM SIDE -->
  <div class="form-side">
    <div class="login-box">
      <h2>Criar Conta</h2>
      <div id="errorMessage"></div>
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label>Nome Completo</label>
          <input type="text" id="nome" placeholder="João Silva" required>
        </div>
        <div class="input-group">
          <label>E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required>
        </div>
        <div class="input-group">
          <label>Confirmar Senha</label>
          <input type="password" id="confirmaSenha" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-confirm">✦ Criar Conta Grátis</button>
        <p class="footer-text">Já tem conta? <a href="/auth/login">Fazer login</a></p>
      </form>
    </div>
  </div>
</div>

<script src="{{ request.url_for('static', path='js/stars.js') }}"></script>
<script>
  async function handleRegister(event) {
    event.preventDefault();

    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const confirmaSenha = document.getElementById('confirmaSenha').value;
    const errorDiv = document.getElementById('errorMessage');

    errorDiv.innerHTML = '';

    if (senha !== confirmaSenha) {
      errorDiv.innerHTML = '<p style="color: #ef4444; margin-bottom: 12px;">As senhas não conferem!</p>';
      return;
    }

    try {
      const response = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });

      if (response.ok) {
        errorDiv.innerHTML = '<p style="color: #10b981; margin-bottom: 12px;">✅ Conta criada com sucesso! Redirecionando...</p>';
        setTimeout(() => window.location.href = '/auth/login', 2000);
      } else {
        const error = await response.json();
        errorDiv.innerHTML = `<p style="color: #ef4444; margin-bottom: 12px;">❌ Erro: ${error.detail}</p>`;
      }
    } catch (error) {
      console.error('Erro:', error);
      errorDiv.innerHTML = '<p style="color: #ef4444; margin-bottom: 12px;">Erro ao criar conta</p>';
    }
  }
</script>
</body>
</html>
