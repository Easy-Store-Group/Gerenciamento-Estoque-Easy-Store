<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/login.css') }}">
    <title>Cadastro - EasyStore</title>
</head>
<body>
<div class="page" id="page">
  <div class="branding" id="branding">
    <div class="bg-layer" id="bgLayer"></div>
    <div class="stars" id="stars"></div>
    <div class="brand-content">
      <div class="logo-row">
        <img class="logo-icon" src="{{ request.url_for('static', path='img/logo.png') }}" alt="EasyStore logo" width="500">
        <span class="brand-name" id="brandName">EasyStore</span>
      </div>
      <p class="tagline" id="tagline">Crie sua conta<br>e acompanhe suas compras</p>
      <p class="sub">Catálogo, categorias e histórico em um só lugar ✦</p>
    </div>
  </div>

  <div class="form-side">
    <div class="login-box">
      <h2>Cadastrar</h2>
      {% if erro %}
        <p style="color: red;">{{ erro }}</p>
      {% endif %}
      <form action="/auth/register" method="post">
        <div class="input-group">
          <label>Nome completo</label>
          <input type="text" name="nome" placeholder="Seu nome" required>
        </div>
        <div class="input-group">
          <label>E-mail</label>
          <input type="email" name="email" placeholder="Digite seu e-mail" required>
        </div>
        <div class="input-group">
          <label>Telefone (opcional)</label>
          <input type="text" name="telefone" placeholder="(00) 00000-0000">
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" name="senha" placeholder="••••••••" minlength="6" required>
        </div>
        <button type="submit" class="btn-confirm">✦ Criar conta</button>
        <p class="footer-text">Já tem conta? <a href="/auth/login">Entrar</a></p>
        <p class="footer-text">Voltar para o <a href="/">Início</a></p>
      </form>
    </div>
  </div>
</div>
<script src="{{ request.url_for('static', path='js/stars.js') }}"></script>
</body>
</html>
