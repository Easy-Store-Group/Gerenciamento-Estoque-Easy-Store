<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eazy Store</title>
    <link rel="stylesheet" href="static/login.css">
</head>
<body>
    <div class="container">
        <div class="branding-side">
            <div class="logo">
                <span class="icon"></span> EasyStore
            </div>
            <div class="content">
                <h1>O caminho mais fácil para o seu setup dos sonhos.</h1>
                <p>PCs, consoles e jogos em um só lugar.</p>
            </div>
        </div>

        <div class="form-side">
            <div class="login-box">
                <h2>Criar Conta</h2>
                <form>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-confirm">Confirmar</button>
                </form>
                <p class="footer-text">Já tem uma conta? <a href="#">Entrar</a></p>
            </div>
        </div>
    </div>
</body>
</html>
