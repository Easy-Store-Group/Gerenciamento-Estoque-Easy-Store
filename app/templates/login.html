<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/login.css">
    <title>Document</title>
</head>
<body>
    


<div class="page" id="page">
  <!-- BRANDING -->
  <div class="branding" id="branding">
    <div class="bg-layer" id="bgLayer"></div>
    <div class="stars" id="stars"></div>

    <!-- AstroBot SVG element -->
    <div class="astrobot-wrap" id="botWrap">
      <svg viewBox="0 0 110 130" xmlns="http://www.w3.org/2000/svg" width="110" height="130">
        <!-- Thruster flames (bottom) -->
        <g id="flames">
          <ellipse cx="42" cy="122" rx="7" ry="10" fill="#ff6600" opacity=".9"/>
          <ellipse cx="42" cy="126" rx="4" ry="7" fill="#ffcc00" opacity=".85"/>
          <ellipse cx="68" cy="122" rx="7" ry="10" fill="#ff6600" opacity=".9"/>
          <ellipse cx="68" cy="126" rx="4" ry="7" fill="#ffcc00" opacity=".85"/>
        </g>

        <!-- Legs -->
        <rect x="33" y="100" width="18" height="16" rx="7" fill="#3a7bd5"/>
        <rect x="58" y="100" width="18" height="16" rx="7" fill="#3a7bd5"/>
        <rect x="36" y="112" width="14" height="10" rx="5" fill="#2060c0"/>
        <rect x="60" y="112" width="14" height="10" rx="5" fill="#2060c0"/>

        <!-- Left arm -->
        <g transform="rotate(-30,20,75)">
          <rect x="10" y="68" width="18" height="26" rx="9" fill="white" stroke="#d0d8e8" stroke-width="1.5"/>
          <rect x="13" y="88" width="12" height="10" rx="5" fill="#3a7bd5"/>
          <!-- thumb/fingers -->
          <rect x="7" y="86" width="8" height="7" rx="3.5" fill="white" stroke="#c0c8d8" stroke-width="1"/>
        </g>

        <!-- Right arm -->
        <g transform="rotate(30,90,75)">
          <rect x="82" y="68" width="18" height="26" rx="9" fill="white" stroke="#d0d8e8" stroke-width="1.5"/>
          <rect x="84" y="88" width="12" height="10" rx="5" fill="#3a7bd5"/>
          <rect x="95" y="86" width="8" height="7" rx="3.5" fill="white" stroke="#c0c8d8" stroke-width="1"/>
        </g>

        <!-- Body -->
        <rect x="28" y="60" width="54" height="48" rx="16" fill="white" stroke="#d0d8e8" stroke-width="2"/>
        <!-- Blue chest panel -->
        <rect x="36" y="68" width="38" height="28" rx="10" fill="#3a7bd5"/>
        <!-- Chest glow -->
        <ellipse cx="55" cy="82" rx="12" ry="8" fill="#60aaff" opacity=".7"/>
        <ellipse cx="55" cy="82" rx="7" ry="5" fill="#a0d4ff" opacity=".6"/>

        <!-- Neck -->
        <rect x="46" y="52" width="18" height="12" rx="4" fill="#e8eef8"/>

        <!-- HEAD - rounded square like Astro Bot -->
        <rect x="22" y="16" width="66" height="58" rx="20" fill="#1a1a2e"/>
        <!-- Head white highlight -->
        <rect x="22" y="16" width="66" height="58" rx="20" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2"/>
        <!-- Faceplate visor -->
        <rect x="26" y="20" width="58" height="50" rx="18" fill="#0d0d25"/>

        <!-- Eyes - glowing blue like Astro Bot -->
        <g id="eyeGroup">
          <ellipse cx="40" cy="42" rx="10" ry="12" fill="#0044cc"/>
          <ellipse cx="40" cy="42" rx="8" ry="10" fill="#0066ff"/>
          <ellipse cx="40" cy="42" rx="6" ry="8" fill="#00aaff"/>
          <ellipse cx="40" cy="42" rx="4" ry="5.5" fill="#80d8ff"/>
          <ellipse cx="38" cy="39" rx="2" ry="2.5" fill="white" opacity=".7"/>

          <ellipse cx="70" cy="42" rx="10" ry="12" fill="#0044cc"/>
          <ellipse cx="70" cy="42" rx="8" ry="10" fill="#0066ff"/>
          <ellipse cx="70" cy="42" rx="6" ry="8" fill="#00aaff"/>
          <ellipse cx="70" cy="42" rx="4" ry="5.5" fill="#80d8ff"/>
          <ellipse cx="68" cy="39" rx="2" ry="2.5" fill="white" opacity=".7"/>
        </g>

        <!-- Eye glow bloom -->
        <ellipse cx="40" cy="42" rx="13" ry="15" fill="#0088ff" opacity=".18"/>
        <ellipse cx="70" cy="42" rx="13" ry="15" fill="#0088ff" opacity=".18"/>

        <!-- Antenna -->
        <rect x="52" y="4" width="6" height="16" rx="3" fill="#c0d0e8"/>
        <circle cx="55" cy="3" r="6" fill="#00aaff"/>
        <circle cx="55" cy="3" r="3.5" fill="#80e4ff"/>
        <circle cx="53.5" cy="1.5" r="1.5" fill="white" opacity=".7"/>
      </svg>
    </div>

    <!-- Text content BEHIND bot (z:3 vs bot z:10) -->
    <div class="brand-content">
      <div class="logo-row">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M3 12l2-2 4 4 8-8 2 2-10 10z" fill="currentColor"/>
        </svg>
        <span class="brand-name" id="brandName">EasyStore</span>
      </div>
      <p class="tagline" id="tagline">PCs, consoles e jogos<br>em um só lugar</p>
      <p class="sub">Seu universo gamer começa aqui ✦</p>
    </div>
  </div>

  <!-- FORM SIDE -->
  <div class="form-side">
    <div class="login-box">
      <h2>Criar Conta</h2>
      <div class="input-group">
        <label>E-mail</label>
        <input type="email" placeholder="Digite seu e-mail">
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="••••••••">
      </div>
      <button class="btn-confirm">✦ Confirmar</button>
      <p class="footer-text">Já tem uma conta? <a href="#">Entrar</a></p>
    </div>
  </div>
</div>
<script src="static/js/script.js"></script>
</body>
</html>
