<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Meu Perfil - EasyStore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #7c3aed;
      --primary-dark: #6d28d9;
      --secondary: #ec4899;
      --success: #10b981;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--gray-800);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .profile-header {
      background: white;
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .profile-avatar {
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      margin: 0 auto 20px;
    }

    .level-badge {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .profile-info h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--gray-900);
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .xp-progress {
      margin-top: 32px;
    }

    .xp-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: var(--gray-200);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      transition: width 0.3s ease;
    }

    .achievements {
      background: white;
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .achievements h2 {
      font-size: 24px;
      margin-bottom: 24px;
      color: var(--gray-900);
    }

    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .achievement-card {
      background: var(--gray-50);
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .achievement-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.15);
    }

    .achievement-card.locked {
      opacity: 0.6;
    }

    .achievement-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .achievement-name {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--gray-900);
    }

    .achievement-desc {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    .achievement-xp {
      font-size: 11px;
      color: var(--primary);
      font-weight: 600;
      margin-top: 8px;
    }

    .next-achievement {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border: 2px solid #fcd34d;
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }

    .next-achievement h3 {
      color: var(--gray-900);
      margin-bottom: 12px;
      font-size: 14px;
    }

    .next-achievement-progress {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .next-achievement-bar {
      flex: 1;
    }

    .next-achievement-bar .progress-bar {
      height: 8px;
    }

    .next-achievement-xp {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-800);
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: white;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .profile-header {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .achievements-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }

      .profile-header, .achievements {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-header" id="profileHeader">
      <div class="loading"><div class="spinner"></div></div>
    </div>

    <div class="achievements" id="achievementsContainer">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <script>
    async function loadProfile(usuarioId) {
      try {
        const [usuarioRes, conquistasRes] = await Promise.all([
          fetch(`/api/vendas/usuario/${usuarioId}`),
          fetch(`/api/conquistas/usuario/${usuarioId}`)
        ]);

        const usuario = await usuarioRes.json();
        const conquistas = await conquistasRes.json();

        renderProfile(usuario, conquistas);
      } catch (error) {
        console.error('Erro ao carregar perfil:', error);
        document.getElementById('profileHeader').innerHTML = '<p style="color: #666;">Erro ao carregar perfil</p>';
      }
    }

    function renderProfile(usuario, conquistas) {
      const progressoXp = usuario.xp_total % (usuario.nivel * 100);
      const xpNivel = usuario.nivel * 100;
      const percentualXp = (progressoXp / xpNivel) * 100;

      document.getElementById('profileHeader').innerHTML = `
        <div class="profile-avatar">
          <div class="avatar">🎮</div>
          <div class="level-badge">Nível ${usuario.nivel}</div>
        </div>
        <div class="profile-info">
          <h1>${usuario.nome}</h1>
          <div class="profile-stats">
            <div class="stat-item">
              <div class="stat-value">${usuario.xp_total}</div>
              <div class="stat-label">XP Total</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${conquistas.total_conquistadas}</div>
              <div class="stat-label">Conquistas</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${usuario.moedas_resgate}</div>
              <div class="stat-label">Moedas</div>
            </div>
          </div>

          <div class="xp-progress">
            <div class="xp-header">
              <span>Progresso do Nível</span>
              <span>${progressoXp}/${xpNivel} XP</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${percentualXp}%"></div>
            </div>
          </div>
        </div>
      `;

      let achievementsHtml = '<h2>🏆 Minhas Conquistas</h2><div class="achievements-grid">';

      conquistas.conquistadas.forEach(c => {
        achievementsHtml += `
          <div class="achievement-card">
            <div class="achievement-icon">${c.icon}</div>
            <div class="achievement-name">${c.nome}</div>
            <div class="achievement-desc">${c.descricao}</div>
          </div>
        `;
      });

      if (conquistas.proxima_conquista) {
        const percentualProxima = ((usuario.xp_total) / conquistas.proxima_conquista.xp_requerido) * 100;
        achievementsHtml += `
          <div class="next-achievement">
            <h3>⏳ Próxima Conquista: ${conquistas.proxima_conquista.icon} ${conquistas.proxima_conquista.nome}</h3>
            <p style="font-size: 12px; color: #666; margin-bottom: 12px;">${conquistas.proxima_conquista.descricao}</p>
            <div class="next-achievement-progress">
              <div class="next-achievement-bar">
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${Math.min(percentualProxima, 100)}%"></div>
                </div>
              </div>
              <div class="next-achievement-xp">${conquistas.proxima_conquista.xp_faltante} XP faltam</div>
            </div>
          </div>
        `;
      }

      achievementsHtml += '</div>';
      document.getElementById('achievementsContainer').innerHTML = achievementsHtml;
    }

    // Obter ID do usuário da URL ou usar um padrão
    const urlParams = new URLSearchParams(window.location.search);
    const usuarioId = urlParams.get('id') || 1;
    loadProfile(usuarioId);
  </script>
</body>
</html>
