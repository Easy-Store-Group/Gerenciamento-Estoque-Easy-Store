<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyStore - PDV</title>
    <link rel="stylesheet" href="static/css/produtos.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">
        <div class="branding">
            <div class="bg-layer crystal"></div>
            
            <div class="pdv-header">
                <h1 class="brand-name lit">EasyStore</h1>
                <p style="color: white; opacity: 0.8; position: relative; z-index: 1;">Vendas Online - Catálogo de Itens</p>
            </div>

            <div class="categories-bar">
                <button class="cat-btn active">TODOS</button>
                <button class="cat-btn">CONSOLES</button>
                <button class="cat-btn">JOGOS</button>
                <button class="cat-btn">ACESSÓRIOS</button>
                <button class="cat-btn">COMPUTADORES</button>
            </div>
            
            <div class="products-grid">
                <div class="product-card" onclick="adicionarAoCarrinho('DualSense PS5', 450.00)">
                    <div class="product-info">
                        <h3>DualSense PS5</h3>
                        <img src="static/images/ps5.png" alt="Console PS5">
                        <span class="price">R$ 450,00</span>
                    </div>
                </div>
                <div class="product-card" onclick="adicionarAoCarrinho('Console PS5', 3999.90)">
                    <div class="product-info">
                        <img src="static/images/ps5.png" alt="Console PS5">
                        <h3>Console PS5</h3>
                        <span class="price">R$ 3.999,90</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-side cart-side">
            <div class="login-box cart-box">
                <div class="cart-header">
                    <h2 class="brand-name-mini">Venda Atual</h2>
                </div>

                <div class="cart-table-header">
                    <span class="col-item">Item</span>
                    <span class="col-qtd">Qtd</span>
                    <span class="col-total">Total</span>
                </div>

                <div class="cart-items" id="lista-carrinho">
                    <p class="sub-placeholder">Caixa Livre</p>
                </div>
                
                <div class="total-display-box">
                    <span class="total-label">VALOR TOTAL</span>
                    <span class="total-value" id="total-venda">R$ 0,00</span>
                </div>

                <div class="cart-footer-actions">
                    <button class="btn-action btn-cancel" onclick="limparCarrinho()">Cancelar</button>
                    <button class="btn-action btn-confirm">Receber e Finalizar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/produtos.js"></script>
</body>
</html>
